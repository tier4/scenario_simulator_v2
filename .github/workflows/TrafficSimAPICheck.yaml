name: Check API compatibility
on:
  workflow_dispatch:
  workflow_run:
    workflows: ["BuildAndRun"]
    types:
      - completed

jobs:
  api_check:
    name: TrafficSim API Check
    runs-on: ${{ matrix.runs_on }}
    env:
      DEBIAN_FRONTEND: noninteractive
    strategy:
      fail-fast: false
      matrix:
        runs_on: [ubuntu-22.04, ubuntu-22.04-arm]
    steps:
      - name: Install abigail-tools
        run: |
          sudo apt-get update
          sudo apt-get install -y abigail-tools

      - name: Lookup previous workflow run
        id: previous_run
        uses: actions/github-script@v6
        with:
          script: |
            const runs = await github.rest.actions.listWorkflowRuns({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'BuildAndRun.yaml',
              branch: 'master',
              event: 'schedule',
              status: 'success',
            });
            if (runs.data.total_count === 0) {
              throw new Error('No previous successful scheduled workflow run found');
            }
            const run = runs.data.workflow_runs[0];
            return run.id;
          result-encoding: string

      - name: Download previous install artifact
        if: steps.previous_run.outputs.result != 'null'
        uses: actions/download-artifact@v5
        with:
          run-id: "18302761945"
          name: install-${{ matrix.runs_on }}-RelWithDebInfo
          path: previous
          github-token: ${{ secrets.GH_PAT }}

      - name: Download current install artifact
        uses: actions/download-artifact@v5
        # if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        with:
          name: install-${{ matrix.runs_on }}-RelWithDebInfo
          run-id: "18302761945"
          path: current
          github-token: ${{ secrets.GH_PAT }}

      - name: Call ABIDIFF
        run: |
          abidiff --no-fail-on-changes --fail-no-debug-info --drop-private-types previous/install/lib/libtraffic_simulator.so current/install/lib/libtraffic_simulator.so
