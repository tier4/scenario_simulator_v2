name: Docker
on:
  pull_request:
    paths:
      - "**"
      - "!docs/**"
      - "!README.md"
      - "!CONTRIBUTING.md"
      - "!.github/**"
      - ".github/workflows/Docker.yaml"
      - "!mkdocs.yml"
      - "!pyproject.toml"
      - "!sonar-project.properties"
      - "!uv.lock"
  push:
    branches:
      - master
    paths:
      - "**/package.xml"
  workflow_dispatch:
    inputs:
      version:
        description: version of the scenario_simulator_v2
        required: true

jobs:
  build:
    name: Build Docker Image
    runs-on: ${{ matrix.runs-on }}
    timeout-minutes: 720
    strategy:
      matrix:
        rosdistro: [humble]
        runs-on: [ubuntu-22.04, ubuntu-22.04-arm]
        dockerfile: [Dockerfile]
        image_tag: [humble]
        include:
          - runs-on: ubuntu-22.04
            platform: linux/amd64
            dockerfile: Dockerfile
            image_tag: humble
          - runs-on: ubuntu-22.04-arm
            platform: linux/arm64
            dockerfile: Dockerfile
            image_tag: humble
          - runs-on: ubuntu-22.04
            platform: linux/amd64
            dockerfile: Dockerfile.traffic_simulator
            image_tag: traffic_simulator_humble
          - runs-on: ubuntu-22.04-arm
            platform: linux/arm64
            dockerfile: Dockerfile.traffic_simulator
            image_tag: traffic_simulator_humble

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false

      - name: Install catkin-pkg
        run: sudo apt update && sudo apt install -y python3-catkin-pkg git curl

      - name: Install docker for ubuntu runner
        uses: docker/setup-buildx-action@v3

      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "version=$(catkin_package_version)" >> $GITHUB_OUTPUT

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create image tag
        id: image_tag
        run: echo "image_tag=ghcr.io/tier4/scenario_simulator_v2:${{ matrix.image_tag }}-${{ github.event.inputs.version || steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_tag.outputs.image_tag }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          push: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          file: ${{ matrix.dockerfile }}
          outputs: type=image,name=${{ steps.image_tag.outputs.image_tag }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            ROS_DISTRO=${{ matrix.rosdistro }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Prepare
        id: prepare
        run: |
          echo "image=${{ steps.image_tag.outputs.image_tag }}" >> $GITHUB_OUTPUT
          echo "digest=${{ steps.build.outputs.digest }}" >> $GITHUB_OUTPUT

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.image_tag }}-${{ matrix.platform }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        include:
          - image_tag: humble
          - image_tag: traffic_simulator_humble
    steps:
      - name: Download digests
        uses: actions/download-artifact@v7
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image_tag }}-*
          merge-multiple: true

      - name: Install catkin-pkg
        run: sudo apt update && sudo apt install -y python3-catkin-pkg git curl

      - uses: actions/checkout@v6

      - name: Get version
        id: version
        run: echo "version=$(catkin_package_version)" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Create image tag
        id: image_tag
        run: echo "image_tag=ghcr.io/tier4/scenario_simulator_v2:${{ matrix.image_tag }}-${{ github.event.inputs.version || steps.version.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_tag.outputs.image_tag }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create -t ${{ steps.image_tag.outputs.image_tag }} $(printf '${{ steps.image_tag.outputs.image_tag }}@sha256:%s ' *)
